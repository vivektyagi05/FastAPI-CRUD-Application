<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Manager — FastAPI CRUD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

<!-- ============================================================
     HEADER
     ============================================================ -->
<header class="header">
  <div class="header-inner">
    <a class="logo" href="/">
      <div class="logo-icon">✓</div>
      TaskManager
    </a>
    <div style="display:flex; align-items:center; gap:12px;">
      <span class="header-badge">FastAPI + SQLite</span>
      <a href="/docs" class="btn btn-ghost btn-sm" target="_blank" rel="noopener">
        📄 Swagger
      </a>
    </div>
  </div>
</header>


<!-- ============================================================
     MAIN
     ============================================================ -->
<main class="main">

  <!-- ── CREATE TASK FORM (POST /tasks) ──────────────────────── -->
  <p class="section-label">New task <span class="method-tag post">POST</span></p>

  <div class="card form-card">
    <div class="form-title">
      Add a Task <span>Fill in the details below</span>
    </div>

    <form id="task-form">
      <div class="form-grid">

        <div class="form-group">
          <label for="title">Title <span style="color:var(--red)">*</span></label>
          <input
            type="text"
            id="title"
            placeholder="e.g. Review pull request"
            maxlength="200"
            autocomplete="off"
            required />
        </div>

        <div class="form-group">
          <label for="status">Status</label>
          <select id="status">
            <option value="Pending">🕐 Pending</option>
            <option value="Completed">✅ Completed</option>
          </select>
        </div>

        <div class="form-group full">
          <label for="description">Description <span style="color:var(--slate-300);">(optional)</span></label>
          <textarea
            id="description"
            placeholder="Any additional notes…"
            maxlength="1000"></textarea>
        </div>

        <div class="form-actions">
          <button type="button" id="cancel-btn" class="btn btn-secondary">Cancel</button>
          <button type="submit" id="submit-btn" class="btn btn-primary">
            <span class="method-tag post" style="background:rgba(255,255,255,.2);color:#fff">POST</span>
            Add Task
          </button>
        </div>

      </div>
    </form>
  </div>


  <!-- ── TASK LIST (GET /tasks) ─────────────────────────────── -->
  <div class="list-header">
    <div class="list-title">
      Tasks
      <span class="count-badge" id="task-count">0</span>
      <span class="method-tag get" style="margin-left:4px">GET</span>
    </div>
    <div class="filter-group">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="Pending">Pending</button>
      <button class="filter-btn" data-filter="Completed">Completed</button>
    </div>
  </div>

  <div id="task-list">
    <!-- Task cards are injected here by app.js -->
  </div>

</main>


<!-- ============================================================
     EDIT MODAL (PUT /tasks/{id})
     ============================================================ -->
<div id="edit-modal" class="modal-overlay" style="display:none;">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">
        Edit Task
        <span class="method-tag put" style="margin-left:8px;">PUT</span>
      </div>
      <button class="modal-close" onclick="closeModal()" aria-label="Close">✕</button>
    </div>

    <form id="edit-form">
      <div class="form-grid">

        <div class="form-group">
          <label for="edit-title">Title <span style="color:var(--red)">*</span></label>
          <input type="text" id="edit-title" maxlength="200" required />
        </div>

        <div class="form-group">
          <label for="edit-status">Status</label>
          <select id="edit-status">
            <option value="Pending">🕐 Pending</option>
            <option value="Completed">✅ Completed</option>
          </select>
        </div>

        <div class="form-group full">
          <label for="edit-description">Description</label>
          <textarea id="edit-description" maxlength="1000"></textarea>
        </div>

        <div class="form-actions">
          <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
          <button type="submit" id="edit-submit-btn" class="btn btn-primary">
            <span class="method-tag put" style="background:rgba(255,255,255,.2);color:#fff">PUT</span>
            Save Changes
          </button>
        </div>

      </div>
    </form>
  </div>
</div>


<!-- ============================================================
     TOAST CONTAINER
     ============================================================ -->
<div id="toast-container" aria-live="polite"></div>


<!-- app.js — all Fetch API calls live here -->
<script src="/static/app.js"></script>
</body>
</html>
